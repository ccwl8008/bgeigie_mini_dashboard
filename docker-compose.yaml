version: "3.8"

# Proyecto bGeigie Dashboard para Coolify
# Servicios:
#  - db: MariaDB con los datos migrados del bGeigie
#  - backend: FastAPI (Python) que reemplaza los .php originales:
#       * ingesta de datos del sensor (bGeigiePost.php)
#       * visualización con login (bGeigieVisualizar.php)
#
# En Coolify: crea un "Docker Compose" resource, pega este archivo,
# define las variables de entorno de abajo (o usa un .env) y despliega.
# Apunta tu dominio (ya tienes el DNS listo) al servicio "backend".

services:
  db:
    image: mariadb:10.11
    container_name: bgeigie-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cyber2sof_bGeigie}
      MYSQL_USER: ${MYSQL_USER:-cyber2sof_nano}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - bgeigie_db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: bgeigie-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-cyber2sof_bGeigie}
      DB_USER: ${MYSQL_USER:-cyber2sof_nano}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NOMBRE: ${ADMIN_NOMBRE:-Administrador}
      # Deja vacío si la app vive en la raíz del dominio. Para un
      # subdirectorio (ej. https://cybersof.com/bGeigie) pon /bGeigie
      # (sin "/" al final) y ajusta las labels de Traefik de abajo igual.
      BASE_PATH: ${BASE_PATH:-}
    # Coolify inyecta Traefik automáticamente si expones el puerto así:
    expose:
      - "8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.bgeigie.loadbalancer.server.port=8000"
      # --- Enrutamiento por subdirectorio (ej. /bGeigie) ---
      # Ajusta el dominio y el prefijo a tu caso. Si NO usas subdirectorio
      # (dominio propio tipo bgeigie.cybersoft.com), borra este bloque y
      # deja que Coolify maneje el dominio desde su propio campo "Domains".
      - "traefik.http.routers.bgeigie.rule=Host(`cybersof.com`) && PathPrefix(`/bGeigie`)"
      - "traefik.http.routers.bgeigie.entrypoints=https"
      - "traefik.http.routers.bgeigie.tls=true"
      - "traefik.http.middlewares.bgeigie-stripprefix.stripprefix.prefixes=/bGeigie"
      - "traefik.http.routers.bgeigie.middlewares=bgeigie-stripprefix"

volumes:
  bgeigie_db_data:
